<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>⭐星路无限 心动射击⭐</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
  *{box-sizing:border-box;margin:0;padding:0;}
  html,body{height:100%;overflow:hidden;font-family:Arial,sans-serif;background:linear-gradient(135deg,#f2b3c6,#4ab7cc);}
  .top{position:fixed;top:0;left:0;width:100%;display:flex;justify-content:space-between;padding:20px;font-size:20px;color:white;z-index:2;}
  .score,.time{font-weight:bold;}
  .container{width:100%;height:100vh;position:relative;overflow:hidden;}
  .galaxy{position:absolute;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:0;}
  .galaxy::before,.galaxy::after{content:"";position:absolute;width:200%;height:200%;background-image:
    radial-gradient(#ffffff55 2px, transparent 2px),
    radial-gradient(#f2b3c655 2px, transparent 2px),
    radial-gradient(#4ab7cc55 2px, transparent 2px);
    background-size:120px 120px;
    animation:galaxyMove 40s linear infinite;}
  .galaxy::after{animation-duration:70s;opacity:0.6;}
  @keyframes galaxyMove{from{transform:translateY(0);}to{transform:translateY(-800px);}}
  .particle{position:absolute;font-size:32px;cursor:pointer;text-shadow:0 0 6px rgba(255,255,255,0.5);}
  .star{color:#f2b3c6;text-shadow:0 0 8px #4ab7cc;}
  .heart{color:#4ab7cc;text-shadow:0 0 8px #f2b3c6;}
  .ripple{position:absolute;width:50px;height:50px;border:3px solid;border-radius:50%;animation:wave 0.6s forwards;}
  @keyframes wave{0%{transform:scale(0.3);opacity:1;}100%{transform:scale(2.2);opacity:0;}}
  .scorePop{position:absolute;font-size:24px;font-weight:bold;color:white;animation:scoreUp 0.9s forwards;}
  @keyframes scoreUp{0%{transform:translateY(0);opacity:1;}100%{transform:translateY(-50px);opacity:0;}}
  .win{position:fixed;top:0;left:0;width:100%;height:100%;display:flex;flex-direction:column;justify-content:center;align-items:center;background:rgba(0,0,0,0.6);color:white;z-index:3;}
  .winTitle{font-size:48px;margin-bottom:20px;}
  .winText{font-size:32px;margin-bottom:10px;}
  .start{position:fixed;width:100%;height:100%;display:flex;flex-direction:column;justify-content:center;align-items:center;color:white;z-index:3;}
  .title1{font-size:48px;margin-bottom:10px;background:linear-gradient(45deg,#f2b3c6,#4ab7cc);-webkit-background-clip:text;color:transparent;}
  .title2{font-size:36px;margin-bottom:50px;background:linear-gradient(45deg,#4ab7cc,#f2b3c6);-webkit-background-clip:text;color:transparent;}
  .startBtn{font-size:24px;padding:10px 30px;border-radius:30px;background:linear-gradient(45deg,#f2b3c6,#4ab7cc);cursor:pointer;}
</style>
</head>
<body>

<div class="container" id="game-container">
  <div class="galaxy"></div>

  <div class="top">
    <div class="score">得分 0</div>
    <div class="time">时间 60</div>
  </div>

  <div class="start" id="start-screen">
    <div class="title1">星路无限</div>
    <div class="title2">心动射击</div>
    <div class="startBtn" id="startBtn">点击开始</div>
  </div>

  <div class="win" id="win-screen" style="display:none;">
    <div class="winTitle">⭐星途璀璨⭐</div>
    <div class="winText" id="final-score">最终得分 0</div>
    <div class="winText" id="final-level">最终等级 初见</div>
  </div>
</div>

<script>
const gameContainer = document.getElementById("game-container");
const startScreen = document.getElementById("start-screen");
const startBtn = document.getElementById("startBtn");
const winScreen = document.getElementById("win-screen");
const scoreEl = document.querySelector(".score");
const timeEl = document.querySelector(".time");
const finalScoreEl = document.getElementById("final-score");
const finalLevelEl = document.getElementById("final-level");

let score = 0;
let time = 60;
let timer = null;
let lastType = null;
let particles = [];
let ripples = [];
let effects = [];

const width = window.innerWidth;
const height = window.innerHeight;

// ================= 创建粒子 =================
function createParticles(){
  particles = [];
  for(let i=0;i<60;i++){
    const type = Math.random()>0.5?"star":"heart";
    particles.push({
      id:i,
      type:type,
      icon:type==="star"?"✦":"♡",
      x:Math.random()*width,
      y:Math.random()*height,
      r:Math.random()*360
    });
  }
  renderParticles();
  moveParticles();
}

// ================= 渲染粒子 =================
function renderParticles(){
  // 删除之前所有粒子
  document.querySelectorAll(".particle").forEach(el=>el.remove());

  particles.forEach((p,index)=>{
    const el = document.createElement("div");
    el.className = `particle ${p.type}`;
    el.style.left = p.x + "px";
    el.style.top = p.y + "px";
    el.style.transform = `rotate(${p.r}deg)`;
    el.textContent = p.icon;
    el.dataset.index = index; // 用数组索引
    el.addEventListener("click", hitParticle);
    gameContainer.appendChild(el);
  });
}

// ================= 粒子移动 =================
function moveParticles(){
  setInterval(()=>{
    particles.forEach(p=>{
      p.y -= 3;
      p.x += Math.random()*4-2;
      if(p.y<-20) p.y = height;
      if(p.x<0) p.x=width;
      if(p.x>width) p.x=0;
    });
    renderParticles();
  },80);
}

// ================= 点击粒子 =================
function hitParticle(e){
  const index = parseInt(e.currentTarget.dataset.index);
  const p = particles[index];
  if(!p) return;

  if(lastType===null){ lastType = p.type; return; }

  if(lastType!==p.type){
    score++;
    scoreEl.textContent = "得分 "+score;
    lastType = p.type;
    showScore(p.x,p.y);
    checkSpecial(score);
  }
  showRipple(p.x,p.y,p.type);
  showEffect(p.x,p.y,p.type);
}

// ================= 显示点击特效 =================
function showRipple(x,y,type){
  const ripple = document.createElement("div");
  ripple.className = "ripple";
  ripple.style.left = x+"px";
  ripple.style.top = y+"px";
  ripple.style.borderColor = type==="star"?"#f2b3c6":"#4ab7cc";
  gameContainer.appendChild(ripple);
  setTimeout(()=>ripple.remove(),600);
}
function showEffect(x,y,type){
  const el = document.createElement("div");
  el.className="scorePop";
  el.style.left=x+"px";
  el.style.top=y+"px";
  el.textContent="+1";
  gameContainer.appendChild(el);
  setTimeout(()=>el.remove(),900);
}

// ================= 特定分数弹窗 =================
function checkSpecial(score){
  if(score===11) alert("🩵🩷紧张吗");
  if(score===27) alert("🩵🩷有点");
  if(score===108) alert("💗心动+11");
  if(score===1116) alert("⭐星途璀璨 +27");
  if(score===2711) alert("🩵🩷橹穆 +99");
  if(score>=271199) alert("永恒之爱");
}

// ================= 游戏开始 =================
startBtn.addEventListener("click", ()=>{
  startScreen.style.display="none";
  score = 0;
  time = 60;
  scoreEl.textContent = "得分 "+score;
  timeEl.textContent = "时间 "+time;
  lastType = null;
  createParticles();

  timer = setInterval(()=>{
    time--;
    timeEl.textContent = "时间 "+time;
    if(time<=0){
      clearInterval(timer);
      const level = getLevel(score);
      finalScoreEl.textContent = "最终得分 "+score;
      finalLevelEl.textContent = "最终等级 "+level;
      winScreen.style.display="flex";
    }
  },1000);
});

// ================= 得分等级 =================
function getLevel(score){
  if(score<=11) return "初见";
  if(score<=27) return "心动";
  if(score<=108) return "牵手";
  if(score<=1116) return "共振";
  if(score<=2711) return "星途璀璨";
  if(score>=271199) return "永恒之爱";
  return "星途璀璨";
}
</script>
</body>
</html>
