<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>🩵🩷星途璀璨🩷🩵</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
@font-face {
  font-family: "Smiley Sans";
  src: url("https://cdn.jsdelivr.net/gh/atelier-anchor/smiley-sans@latest/SmileySans-Regular.otf") format("opentype");
}

*{box-sizing:border-box;margin:0;padding:0;}
html,body{height:100%;}

body{
  font-family:"Smiley Sans",-apple-system,BlinkMacSystemFont,"PingFang SC","Microsoft YaHei",sans-serif;
  min-height:100vh;
  background:linear-gradient(135deg,#4ab7cc 0%,#79cbd8 25%,#b7dbe3 50%,#e4cddc 75%,#f2b3c6 100%);
  background-attachment:fixed;
  overflow-x:hidden;
  cursor: pointer;
}

/* 粒子画布 */
#particle-canvas{
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  z-index:0;
  pointer-events:none;
}

/* 点击扩散波 */
.ripple{
  position:fixed;
  border-radius:50%;
  pointer-events:none;
  transform:translate(-50%,-50%);
  background:radial-gradient(circle,
    rgba(255,182,210,0.9) 0%,
    rgba(173,216,230,0.7) 40%,
    rgba(255,255,255,0.2) 70%,
    transparent 100%);
  animation:rippleAnim 1.2s ease-out forwards;
  z-index:0;
}

@keyframes rippleAnim{
  from{width:0;height:0;opacity:1;}
  to{width:400px;height:400px;opacity:0;}
}

/* 布局 */
.main-wrapper{
  position:relative;
  z-index:1;
  display:flex;
  justify-content:center;
  padding:80px 30px;
}

.layout{
  width:100%;
  max-width:1200px;
  display:flex;
  gap:50px;
}

.left{flex:3;display:flex;flex-direction:column;gap:30px;}
.right{flex:7;display:flex;flex-direction:column;gap:40px;}

.block,.notice{
  background:rgba(255,255,255,0.92);
  backdrop-filter:blur(12px);
  border-radius:22px;
  padding:40px 42px;
  box-shadow:0 20px 45px rgba(0,0,0,.12);
}

.notice.message{
  flex:1;
  min-height:700px;
  display:flex;
  flex-direction:column;
}

#cusdis_thread iframe{
  width:100%!important;
  min-height:800px!important;
  border:none!important;
}

/* 原本文字样式 */
.block h3{font-size:18px;margin-bottom:18px;}
.block p{font-size:15px;line-height:2;color:#555;}
.block a{font-size:15px;color:#4ab7cc;text-decoration:none;font-weight:600;}

/* NEWS 栏统一字体样式 */
.news-item-title{
  font-family:"Smiley Sans",-apple-system,BlinkMacSystemFont,"PingFang SC","Microsoft YaHei",sans-serif;
  font-size:24px;
  font-weight:600;
  margin:10px 0 20px;
  display:inline-block;
}

.news-item-date{
  font-family:"Smiley Sans",-apple-system,BlinkMacSystemFont,"PingFang SC","Microsoft YaHei",sans-serif;
  font-size:14px;
  color:#999;
  margin-bottom:6px;
}

/* 渐变文字效果，每个字独立渐变（粉蓝渐变） */
.news-gradient{
  background: linear-gradient(135deg, #f2b3c6 0%, #e4cddc 25%, #b7dbe3 50%, #79cbd8 75%, #4ab7cc 100%);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  display:inline-block;
}

.notice-date{font-size:14px;color:#999;}
.notice-title{font-size:24px;margin:10px 0 20px;font-weight:600;}
.notice p{font-size:16px;line-height:2.1;color:#555;}

@media(max-width:900px){
  .layout{flex-direction:column;}
}
</style>
</head>

<body>

<canvas id="particle-canvas"></canvas>

<div class="main-wrapper">
<div class="layout">

<div class="left">

<div class="block">
<h3>🩵🩷一切的开始🩷🩵</h3>
<p>
大家好<br>
这是一个为喜欢而留下的小角落<br>
希望可以慢慢记录<br>
那些感动、陪伴，生活激励<br>
以及继续向前的小小光亮
</p >
</div>

<div class="block">
<h3>⭐⭐NEWS⭐⭐</h3>
<div id="news-list">
  <!-- 最新三条新闻会自动插入这里 -->
</div>
<a href="news.html">璀璨之路 →</a >
</div>

<div class="block">
<h3>🩵🩷幸福时刻🩷🩵</h3>
<p>祝星途璀璨<br>
   幸福降临在我们每一个人的手心
</p >
<a href="happiness.html">前往幸福 →</a >
</div>

<!-- 新增小游戏模块 -->
<div class="block">
<h3>🩵🩷星路无限 击中心动🩷🩵</h3>
<p>点击按钮进入小游戏，享受游戏乐趣！</p >
<button id="enter-game" style="padding:10px 20px; font-size:16px; background:#4da6ff; color:white; border:none; border-radius:5px; cursor:pointer;">
  进入小游戏
</button>
</div>

</div>

<div class="right">

<div class="notice">
<div class="notice-date">2026-02-09</div>
<div class="notice-title">🩵🩷一觉醒来是清晨🩷🩵</div>
<p>记录<br>
   每一个幸福时刻<br>
   每一段璀璨星光</p > 
</div>

<div class="notice message">
<div class="notice-title">🩵🩷留下那一刻的幸福时光🩷🩵</div>

<div id="cusdis_thread"
data-host="https://cusdis.com"
data-app-id="6bd954b7-e2b4-4206-a1c3-3072cecfc326"
data-page-id="global-board"
data-page-title="星途璀璨">
</div>

<script async defer src="https://cusdis.com/js/cusdis.es.js"></script>
</div>

</div>
</div>
</div>

<footer style="text-align:center;font-size:13px;color:#eee;padding:30px 0;position:relative;z-index:1;">
© 2026 LUMU
</footer>

<script>
const canvas = document.getElementById("particle-canvas");
const ctx = canvas.getContext("2d");

function resize() {canvas.width = window.innerWidth; canvas.height = window.innerHeight;}
resize();
window.addEventListener("resize", resize);

const mouse = {x:null, y:null};
window.addEventListener("mousemove", e=>{mouse.x=e.clientX; mouse.y=e.clientY;});
window.addEventListener("touchmove", e=>{mouse.x=e.touches[0].clientX; mouse.y=e.touches[0].clientY;});

const colors = ["rgba(255,182,210,0.9)", "rgba(173,216,230,0.7)"];
const particles = [];
const baseCount = 70;

for(let i=0;i<baseCount;i++){
  particles.push({
    x: Math.random()*canvas.width,
    y: Math.random()*canvas.height,
    vx: (Math.random()-0.5)*0.6,
    vy: (Math.random()-0.5)*0.6,
    size: Math.random()*2+1,
    color: colors[Math.floor(Math.random()*colors.length)],
    life: Infinity
  });
}

window.addEventListener("click", e=>{
  const ripple = document.createElement("div");
  ripple.className = "ripple";
  ripple.style.left = e.clientX+"px";
  ripple.style.top = e.clientY+"px";
  document.body.appendChild(ripple);
  setTimeout(()=>ripple.remove(),1200);

  for(let i=0;i<50;i++){
    particles.push({
      x: e.clientX,
      y: e.clientY,
      vx: (Math.random()-0.5)*6,
      vy: (Math.random()-0.5)*6,
      size: Math.random()*2+1.5,
      color: colors[Math.floor(Math.random()*colors.length)],
      life: 80 + Math.random()*40
    });
  }
});

function draw(){
  ctx.clearRect(0,0,canvas.width,canvas.height);

  for(let i=particles.length-1;i>=0;i--){
    let p = particles[i];

    if(p.life === Infinity && mouse.x !== null){
      let dx = mouse.x - p.x;
      let dy = mouse.y - p.y;
      let dist = Math.sqrt(dx*dx+dy*dy);
      if(dist < 120){ p.x += dx*0.02; p.y += dy*0.02; }
    }

    p.x += p.vx;
    p.y += p.vy;

    if(p.x<0||p.x>canvas.width) p.vx*=-1;
    if(p.y<0||p.y>canvas.height) p.vy*=-1;

    if(p.life !== Infinity){
      p.life--;
      p.vx *= 0.95;
      p.vy *= 0.95;
      if(p.life<=0){particles.splice(i,1); continue;}
    }

    const gradient = ctx.createRadialGradient(p.x, p.y, 0, p.x, p.y, p.size*6);
    gradient.addColorStop(0, p.color);
    gradient.addColorStop(1, "rgba(255,255,255,0)");
    ctx.fillStyle = gradient;
    ctx.beginPath();
    ctx.arc(p.x, p.y, p.size*6, 0, Math.PI*2);
    ctx.fill();
  }

  requestAnimationFrame(draw);
}
draw();

// ================== NEWS 模块自动拉取最新三条 ==================
const newsList = document.getElementById("news-list");

fetch('news.json')
  .then(res=>res.json())
  .then(data=>{
    data.sort((a,b)=> new Date(b.date)-new Date(a.date));
    const latestThree = data.slice(0,3); // 取最新三条
    latestThree.forEach(item=>{
      const div = document.createElement("div");

      // 标题每个字单独渐变
      const titleChars = item.title.split('').map(c=>`<span class="news-gradient">${c}</span>`).join('');

      div.innerHTML = `
        <div class="news-item-date">${item.date}</div>
        <div class="news-item-title">${titleChars}</div>
      `;
      newsList.appendChild(div);
    });
  })
  .catch(err=>console.error(err));

// ================== 新增小游戏按钮点击事件 ==================
document.getElementById('enter-game').addEventListener('click', () => {
  window.open('game.html', '_blank'); // 新页面打开小游戏
});
</script>

</body>
</html>
